<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Visualizar Proprietários</title>

    <style>
      .botao-inserir-novo {
        position: fixed;
        top: 50px;
        left: 100px;
        padding: 35px 50px;
        font-size: 20px;
        cursor: pointer;
        background-color: rgb(70, 166, 230);
        border-radius: 24px;
        transition: 0.2s;
        display: inline-block;
        text-decoration: none;
        color: rgb(0, 0, 0);
        font-family: verdana;
      }

      .logo {
        font-size: 60px;
        font-weight: bold;
        font-family: Arial;
        color: rgb(15, 116, 184);
        text-align: right;
        margin-bottom: 50px;
        margin-top: 65px;
        text-decoration: none;
        display: inline-block;
        margin-right: 85px;
      }

      .conteúdo-do-botao {
        display: flex;
        gap: 140px;
        justify-content: center;
      }

      .botao-inserir-novo:hover {
        background-color: rgb(15, 116, 184);
      }

      table {
        width: 90%;
        margin: 200px auto 30px auto;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
        font-family: verdana;
      }

      th {
        background-color: rgba(101, 175, 224, 0.582);
      }

      tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      footer {
        position: relative;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: rgba(101, 175, 224, 0.582);
        color: rgb(0, 0, 0);
        text-align: center;
        padding: 30px 0;
        font-family: Verdana;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <a href="../index.html" class="logo">🛜FastNet🛜</a>
    <a href="./cad_prop.html" class="botao-inserir-novo"
      >INSERIR NOVO PROPRIETÁRIO</a
    >

    <table id="tabelaProprietarios">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Nascimento</th>
          <th>CPF</th>
          <th>RG</th>
          <th>Email</th>
          <th>Telefone</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      let proprietarios =
        JSON.parse(localStorage.getItem('proprietarios')) || []

      const tbody = document.querySelector('#tabelaProprietarios tbody')

      if (proprietarios.length == 0) {
        const linha = document.createElement('tr')

        const coluna = document.createElement('td')
        coluna.colSpan = 7
        coluna.textContent = 'Nenhum proprietário cadastrado.'

        linha.appendChild(coluna)
        tbody.appendChild(linha)
      }

      proprietarios.forEach(proprietario => {
        const linha = document.createElement('tr')

        let td = document.createElement('td')
        td.textContent = proprietario.id_prop
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.nome
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.nascimento
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.cpf
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.rg
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.email
        linha.appendChild(td)

        td = document.createElement('td')
        td.textContent = proprietario.tel
        linha.appendChild(td)

        tbody.appendChild(linha)
      })
    </script>
    <footer>🛜FastNet🛜 - Uma internet mais rápida do que nunca!</footer>
  </body>
</html>
