<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Visualizar cadastros das residências</title>
  </head>
  <style>
    .botao-inserir-novo {
      position: fixed;
      top: 30px;
      left: 150px;
      padding: 50px 100px;
      font-size: 25px;
      cursor: pointer;
      background-color: rgb(101, 175, 224);
      border-radius: 24px;
      transition: 0.2s;
      display: inline-block;
      text-decoration: underline;
      color: blue;
    }

    .conteúdo-do-botao {
      display: flex;
      gap: 140px;
      justify-content: center;
    }

    a:hover {
      background-color: rgb(15, 116, 184);
    }

    table {
      width: 90%;
      margin: 180px auto 30px auto;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: rgb(101, 175, 224);
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
  </style>
  <body>
    <a href="./cad_resi.html" class="botao-inserir-novo">
      Inserir nova residência
    </a>

    <table id="tabelaResidencias">
      <thead>
        <tr>
          <th>ID</th>
          <th>CEP</th>
          <th>Estado</th>
          <th>Cidade</th>
          <th>Bairro</th>
          <th>Rua</th>
          <th>Número</th>
          <th>complemento</th>
          <th>ID do proprietário</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      let residencias = JSON.parse(localStorage.getItem('residencias'))

      if (residencias == null) {
        residencias = [
          // coloque aqui os registros do seu residencia.csv
        ]

        localStorage.setItem('residencias', JSON.stringify(residencias))
      }

      const proprietarios =
        JSON.parse(localStorage.getItem('proprietarios')) || []

      const tbody = document.querySelector('#tabelaResidencias tbody')

      if (residencias.length == 0) {
        const linha = document.createElement('tr')

        const td = document.createElement('td')

        td.colSpan = 9

        td.textContent = 'Nenhuma residência cadastrada.'

        linha.appendChild(td)

        tbody.appendChild(linha)
      }

      residencias.forEach(res => {
        const linha = document.createElement('tr')

        ;[
          res.id_res,
          res.cep,
          res.estado,
          res.cidade,
          res.bairro,
          res.rua,
          res.numero,
          res.complemento,
          res.id_prop
        ].forEach(valor => {
          const td = document.createElement('td')

          td.textContent = valor

          linha.appendChild(td)
        })

        tbody.appendChild(linha)
      })
    </script>
  </body>
</html>
