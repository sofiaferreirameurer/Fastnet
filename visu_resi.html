<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Visualizar cadastros das residências</title>
  </head>
  <style>
    .botao-inserir-novo {
      position: fixed;
      top: 50px;
      left: 100px;
      padding: 35px 50px;
      font-size: 20px;
      cursor: pointer;
      background-color: rgb(70, 166, 230);
      border-radius: 24px;
      transition: 0.2s;
      display: inline-block;
      text-decoration: none;
      color: rgb(0, 0, 0);
      font-family: verdana;
    }

    .logo {
      font-size: 60px;
      font-weight: bold;
      font-family: Arial;
      color: rgb(15, 116, 184);
      text-align: right;
      margin-bottom: 50px;
      margin-top: 65px;
      text-decoration: none;
      display: block;
      margin-right: 85px;
    }

    .conteúdo-do-botao {
      display: flex;
      gap: 140px;
      justify-content: center;
    }

    .botao-inserir-novo:hover {
      background-color: rgb(15, 116, 184);
    }

    table {
      width: 90%;
      margin: 300px auto 30px auto;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      font-family: verdana;
    }

    th {
      background-color: rgb(101, 175, 224);
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: rgba(101, 175, 224, 0.582);
      color: rgb(0, 0, 0);
      text-align: center;
      padding: 30px 0;
      font-family: Verdana;
      font-size: 13px;
    }
  </style>
  <body>
    <a href="../index.html" class="logo">🛜FastNet🛜</a>
    <a href="./cad_resi.html" class="botao-inserir-novo"
      >INSERIR NOVA RESIDÊNCIA</a
    >

    <table id="tabelaResidencias">
      <thead>
        <tr>
          <th>ID</th>
          <th>CEP</th>
          <th>Número</th>
          <th>Complemento</th>
          <th>Rua</th>
          <th>Bairro</th>
          <th>Cidade</th>
          <th>Estado</th>
          <th>ID do proprietário</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      let residencias = JSON.parse(localStorage.getItem('residencias')) || []

      const proprietarios =
        JSON.parse(localStorage.getItem('proprietarios')) || []

      const tbody = document.querySelector('#tabelaResidencias tbody')

      if (residencias.length == 0) {
        const linha = document.createElement('tr')

        const td = document.createElement('td')
        td.colSpan = 9
        td.textContent = 'Nenhuma residência cadastrada.'

        linha.appendChild(td)
        tbody.appendChild(linha)
      }

      residencias.forEach(res => {
        const linha = document.createElement('tr')

        ;[
          [
            res.id_res,
            res.cep,
            res.numero,
            res.complemento,
            res.rua,
            res.bairro,
            res.cidade,
            res.estado,
            res.id_prop
          ]
        ].forEach(valor => {
          const td = document.createElement('td')

          td.textContent = valor

          linha.appendChild(td)
        })

        tbody.appendChild(linha)
      })
    </script>

    <footer>🛜FastNet🛜 - Uma internet mais rápida do que nunca!</footer>
  </body>
</html>
