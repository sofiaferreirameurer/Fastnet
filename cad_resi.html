<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Residências</title>

    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial;
      }

      .logo {
        font-size: 50px;
        font-weight: bold;
        font-family: Arial;
        color: rgb(15, 116, 184);
        text-align: center;
        margin-bottom: 50px;
        margin-top: 70px;
        text-decoration: none;
      }

      form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px 40px;
        align-items: start;
        margin-top: 120px;
      }

      .campo {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
        margin-bottom: 10px;
      }

      input,
      select {
        width: 250px;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 8px;
        transition: 0.2s;
      }

      select {
        width: 275px;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 8px;
        transition: 0.2s;
        background-color: white;
      }

      input:hover,
      select:hover {
        background-color: rgba(101, 175, 224, 0.582);
      }

      .salvar {
        grid-column: 1/-1;
        justify-self: center;
        background-color: rgb(43, 121, 173);
        color: black;
        border: none;
        grid-column: span 2;
        width: 275px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
      }

      .salvar:hover {
        background-color: rgb(30, 95, 140);
      }

      .obrigatorio {
        color: red;
        font-weight: bold;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: rgba(101, 175, 224, 0.582);
        color: rgb(0, 0, 0);
        text-align: center;
        padding: 30px 0;
        font-family: Verdana;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <a href="../index.html" class="logo">🛜FastNet🛜</a>
    <form id="formResidencia">
      <div class="campo">
        <label for="cep">CEP <span class="obrigatorio">*</span></label>
        <input type="text" id="cep" name="cep" required />
      </div>

      <div class="campo">
        <label for="número">Número <span class="obrigatorio">*</span></label>
        <input type="text" id="número" name="número" required />
      </div>

      <div class="campo">
        <label for="complemento">complemento</label>
        <input type="text" id="complemento" name="complemento" required />
      </div>

      <div class="campo">
        <label for="rua">Rua <span class="obrigatorio">*</span></label>
        <input type="text" id="rua" name="rua" required />
      </div>

      <div class="campo">
        <label for="bairro">Bairro <span class="obrigatorio">*</span></label>
        <input type="text" id="bairro" name="bairro" required />
      </div>

      <div class="campo">
        <label for="cidade">Cidade <span class="obrigatorio">*</span></label>
        <input type="text" id="cidade" name="cidade" required />
      </div>

      <div class="campo">
        <label for="estado">Estado <span class="obrigatorio">*</span></label>
        <select id="estado" name="estado" required>
          <option value="PR">PR</option>
        </select>
      </div>

      <div class="campo">
        <label for="proprietario"
          >Proprietário <span class="obrigatorio">*</span></label
        >
        <select id="proprietario" name="proprietario" required>
          <option value="">Selecione um proprietário</option>
        </select>
      </div>

      <button type="submit" class="salvar">Salvar</button>
    </form>
    <script>
      const proprietarios =
        JSON.parse(localStorage.getItem('proprietarios')) || []

      const select = document.getElementById('proprietario')

      proprietarios.forEach(prop => {
        const option = document.createElement('option')

        option.value = prop.id_prop

        option.textContent = prop.id_prop + ' - ' + prop.nome

        select.appendChild(option)
      })

      let residencias = JSON.parse(localStorage.getItem('residencias')) || []

      const form = document.getElementById('formResidencia')

      form.addEventListener('submit', function (e) {
        e.preventDefault()

        const cep = document.getElementById('cep').value.trim()
        const estado = document.getElementById('estado').value.trim()
        const cidade = document
          .getElementById('cidade')
          .value.trim()
          .toLowerCase()
        const bairro = document.getElementById('bairro').value.trim()
        const rua = document.getElementById('rua').value.trim()
        const numero = document.getElementById('número').value.trim()
        const complemento = document.getElementById('complemento').value.trim()
        const proprietario = document.getElementById('proprietario').value

        if (
          cep == '' ||
          estado == '' ||
          cidade == '' ||
          bairro == '' ||
          rua == '' ||
          numero == '' ||
          complemento == '' ||
          proprietario == ''
        ) {
          alert('Preencha todos os campos.')
          return
        }

        if (cidade != 'curitiba') {
          alert('Cadastro negado pois não atendemos essa cidade.')
          return
        }

        let novoID = 1

        if (residencias.length > 0) {
          novoID = Math.max(...residencias.map(r => r.id_res)) + 1
        }

        const novaResidencia = {
          id_res: novoID,
          cep,
          estado,
          cidade,
          bairro,
          rua,
          numero,
          complemento,
          id_prop: Number(proprietario)
        }

        residencias.push(novaResidencia)

        localStorage.setItem('residencias', JSON.stringify(residencias))

        alert('Residência cadastrada com sucesso!')

        form.reset()
      })
    </script>
    <footer>🛜FastNet🛜 - Uma internet mais rápida do que nunca!</footer>
  </body>
</html>
