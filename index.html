<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gestão de cadastro isp</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #f0f0f0;
      }

      .logo {
        font-size: 50px;
        font-weight: bold;
        font-family: Arial;
        color: rgb(15, 116, 184);
        text-align: center;
        margin-bottom: 100px;
      }

      .conteúdo-do-botao {
        display: flex;
        gap: 140px;
        justify-content: center;
      }

      a {
        padding: 60px 75px;
        font-size: 25px;
        cursor: pointer;
        background-color: rgb(101, 175, 224);
        border-radius: 24px;
        transition: 0.2s;
      }

      a:hover {
        background-color: rgb(15, 116, 184);
      }
    </style>
  </head>

  <body>
    <div class="logo">🛜FastNet🛜</div>

    <div class="conteúdo-do-botao">
      <a href="./visuprop.html">Proprietário</a>
